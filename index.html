<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>OJM Ceramic — Digital Showroom</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <img src="images/logo.png" alt="OJM Ceramic">
    <h1>OJM Ceramic</h1>
    <div class="tag">Digital Showroom</div>
    <div class="field">
      <label>Username</label>
      <input id="lu" autocomplete="username" placeholder="Enter username">
    </div>
    <div class="field">
      <label>Password</label>
      <input id="lp" type="password" autocomplete="current-password" placeholder="Enter password">
    </div>
    <div class="login-err" id="lerr"></div>
    <button class="btn-gold" id="loginBtn">Sign in</button>
    <div class="role-chips">
      <button data-fill="super">Super Manager</button>
      <button data-fill="manager">Manager</button>
      <button data-fill="sales">Sales Team</button>
    </div>
    <div class="login-hint">Tap a role to autofill demo credentials.<br>All passwords: <b>ojm2004</b></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="scrim" id="scrim"></div>
  <div class="app-grid">
    <aside class="side" id="side">
      <div class="brand">
        <img src="images/logo.png" alt="">
        <div><div class="bt">OJM Ceramic</div><div class="bs">Quality in Every Detail</div></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="side-foot">
        <div class="user-box">
          <div class="avatar" id="avatar">O</div>
          <div><div class="un" id="uname">—</div><div class="ur" id="urole">—</div></div>
          <button class="logout" id="logoutBtn" title="Sign out">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="menu-btn" id="menuBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div class="search">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="globalSearch" placeholder="Search designs, collections, surfaces…">
        </div>
        <div class="top-actions">
          <button class="tbtn" id="presentTop"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><span class="lbl">Present</span></button>
          <button class="tbtn" data-go="compare" id="cmpTop"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h7M3 12h7M3 18h7M14 6h7M14 12h7M14 18h7"/></svg><span class="lbl">Compare</span><span class="count" id="cmpCount" style="display:none">0</span></button>
          <button class="tbtn primary" data-go="basket"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4zM3 6h18M16 10a4 4 0 0 1-8 0"/></svg><span class="lbl">Basket</span><span class="count" id="basketCount" style="display:none">0</span></button>
        </div>
      </header>
      <main id="content"></main>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detailOverlay">
  <div class="modal" id="detailModal"></div>
</div>
<!-- FULLSCREEN PHOTO -->
<div class="photo-overlay" id="photoOverlay">
  <button class="photo-close" id="photoClose"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
  <img id="photoImg" alt="Design full view">
</div>
<!-- QR MODAL -->
<div class="overlay" id="qrOverlay">
  <div class="qr-modal" id="qrModal"></div>
</div>

<!-- PRESENTATION -->
<div id="present">
  <div class="pres-stage" id="presStage"></div>
  <button class="exitp" id="presExit" style="position:absolute;top:24px;right:30px;width:auto;border-radius:30px;padding:0 20px;height:46px;display:flex;align-items:center;gap:8px;border:1px solid rgba(213,152,87,.4);color:#fff;font-weight:600">Exit ✕</button>
  <div class="pres-count" id="presCount"></div>
  <div class="pres-bar">
    <button id="presPrev"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
    <button id="presPlay"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg></button>
    <div class="pres-dots" id="presDots"></div>
    <button id="presNext"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>
</div>

<div id="toast"><span class="dot"></span><span id="toastMsg"></span></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="script.js"></script>
</body>
</html>
